name: Build NRO

# Builds the Switch homebrew .nro and uploads it as a downloadable artifact.
# - Every push / PR: build + attach `ferris-ao-switch.nro` to the run's Artifacts.
# - Pushing a tag like `v0.1.0`: also publish a GitHub Release with the .nro.
# - Manual: trigger from the Actions tab via "Run workflow".

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Official devkitPro image: ships the devkitA64 toolchain + libnx, and the
    # dkp-pacman package manager for the SDL2 portlibs we link against.
    container:
      image: devkitpro/devkita64:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SDL2 portlibs
        # The base image has the toolchain but not the SDL2 stack — install the
        # exact set the Makefile links.
        #
        # devkitPro's package server (pkg.devkitpro.org) regularly 403s CI
        # runners on the `-Sy` *database refresh*. The container image already
        # ships pre-synced package databases, so we do NOT depend on the refresh:
        # we try it (best-effort, a few times) and then install from whatever
        # databases are present — the image-bundled ones when the refresh was
        # blocked. Only a genuine package-file outage fails the job now, instead
        # of every transient db-refresh 403.
        run: |
          pkgs="switch-sdl2 switch-sdl2_image switch-sdl2_ttf \
                switch-sdl2_mixer switch-sdl2_net \
                switch-libwebp switch-mbedtls"
          for i in 1 2 3; do
            dkp-pacman -Sy --noconfirm && break
            echo "::warning::db refresh failed (attempt $i) — will use the image's bundled databases"
            sleep 10
          done
          # Install using whatever databases exist (synced or image-bundled).
          dkp-pacman -S --noconfirm --needed $pkgs

      - name: Build
        run: make -j$(nproc)

      - name: Show build output
        run: ls -lh ferris-ao-switch.nro ferris-ao-switch.elf

      - name: Upload NRO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ferris-ao-switch
          path: ferris-ao-switch.nro
          if-no-files-found: error

      - name: Publish release (tags only)
        # Pushing a tag like `v1.05` publishes a GitHub Release with the freshly
        # built .nro attached. Release notes come from docs/RELEASE_NOTES.md
        # (update that file per release); the title is the tag name.
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ferris-ao-switch.nro
          name: Ferris-AO Switch ${{ github.ref_name }}
          body_path: docs/RELEASE_NOTES.md
