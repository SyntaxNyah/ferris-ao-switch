name: Build NRO

# Builds the Switch homebrew .nro and uploads it as a downloadable artifact.
# - Every push / PR: build + attach `ferris-ao-switch.nro` to the run's Artifacts.
# - Pushing a tag like `v0.1.0`: also publish a GitHub Release with the .nro.
# - Manual: trigger from the Actions tab via "Run workflow".

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Official devkitPro image: ships the devkitA64 toolchain + libnx, and the
    # dkp-pacman package manager for the SDL2 portlibs we link against.
    container:
      image: devkitpro/devkita64:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SDL2 portlibs
        # The base image has the toolchain but not the SDL2 stack — install the
        # exact set the Makefile links. devkitPro's mirror (pkg.devkitpro.org)
        # intermittently 403s CI runners during the `-Sy` database refresh, so
        # retry a few times before giving up (this, not a logic error, is what
        # makes some runs fail while identical ones pass minutes later).
        run: |
          set -e
          pkgs="switch-sdl2 switch-sdl2_image switch-sdl2_ttf \
                switch-sdl2_mixer switch-sdl2_net \
                switch-libwebp switch-mbedtls"
          ok=0
          for i in 1 2 3 4 5 6; do
            if dkp-pacman -Sy --noconfirm --needed $pkgs; then ok=1; break; fi
            echo "::warning::dkp-pacman sync failed (attempt $i) — retrying in 20s"
            sleep 20
          done
          if [ "$ok" != 1 ]; then
            echo "::error::Could not install devkitPro portlibs after 6 attempts (pkg.devkitpro.org unreachable / 403)"
            exit 1
          fi

      - name: Build
        run: make -j$(nproc)

      - name: Show build output
        run: ls -lh ferris-ao-switch.nro ferris-ao-switch.elf

      - name: Upload NRO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ferris-ao-switch
          path: ferris-ao-switch.nro
          if-no-files-found: error

      - name: Publish release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ferris-ao-switch.nro
          generate_release_notes: true
